baseURL: "https://jason.re"
languageCode: "en-us"
title: "Thoughts, Links & Moods"
theme: "wilde"
timeZone: Europe/Berlin
summaryLength: 50
pagination:
  pagerSize: 6
  path: "p"
canonifyURLs: false
footnoteReturnLinkContents: "↩"
plainIDAnchors: true
autolink: false
assetDir: "static"
# Date String Format: Mon Jan 2 15:04:05 MST 2006
#sectionPagesMenu: main
permalinks:
  posts:  /posts/:slug
  notes:  /notes/:2006:01:02:150405
  links:  /:sections/:2006:01:02:150405
  photos: /photos/:2006/:01/:slug
  domains: /links/:slug
taxonomies:
  tag: tags
  type: type
  language: languages
  domain: domains

frontmatter:
  date:
    - "date"
    - "lastmod"
    - "publishDate"
    - ":filename"
  publishDate:
    - "date"
    - "publishDate"
  lastmod:
    - "lastmod"
    - ":fileModTime"
    - "publishDate"

markup:
  goldmark:
    parser:
      attribute:
        block: true
      wrapStandAloneImageWithinParagraph: false
    renderer:
      hardWraps: true
      unsafe: true
# if you want markdown WYSIWYG line break
#blackfriday:
#  extensions:
#    - "hardLineBreak"

# main menu
menu:
  main:
  - {identifier: posts,   name: "Posts",   title: "Posts",   url: "/posts/",   weight: 1}
  - {identifier: notes,   name: "Notes",   title: "Notes",   url: "/notes/",   weight: 2}
  - {identifier: links,   name: "Links",   title: "Links",   url: "/links/",   weight: 3}
  - {identifier: photos,  name: "Photos",  title: "Photos",  url: "/photos/",  weight: 4}
  - {identifier: archive, name: "Archive", title: "Archive", url: "/archive/", weight: 5}
  footer:
  - identifier: rss
    name: "RSS"
    title: "RSS feeds"
    pageref: "/feeds/"
    weight: 1
  - identifier: taglist
    name: "Tags"
    title: "Tags"
    pageref: "/tags/"
    weight: 2
  - identifier: Website
    name: "Website"
    title: "Website"
    url: "https://friedrich.uk"
    weight: 3
  - identifier: mastodon
    name: "Mastodon"
    title: "Mastodon"
    url: https://click.ba.it/@jason
    weight: 4

params:
  # --- wilde theme: stream preset ---
  preset: stream
  # hue/altHue omitted: inherit tinycss OKLCH defaults (magenta 347 / blue 262)
  # while we explore the OKLCH palette. NOTE: these are now OKLCH hue ANGLES,
  # not HSL degrees — set e.g. hue: 55 for amber, not 25, when re-theming.
  homeCount: 12
  description: "Jason's personal blog – Thoughts, links & moods"
  mainSections:
  - posts
  - notes
  - links
  - photos
  author:
    given_name: "Jason"
    family_name: "Friedrich"
    display_name: "Jason Friedrich"
    website: "https://friedrich.uk"
    fediverse_handle: "@jason@click.ba.it"
  email: "blog@jason.re"
  friendly_url: jason.re

mediaTypes:
  application/atom+xml:
    suffixes:
      - 'xml'

outputFormats:
  atom:
    baseName: 'index'
    isPlainText: false
    mediaType: 'application/atom+xml'
    rel: 'alternate'

outputs:
  home:
    - HTML
    - Atom
    - JSON
  section:
    - HTML
    - Atom

disableKinds:
  - 'RSS'

caches:
  images:
    dir: :cacheDir/images

privacy:
  googleAnalytics:
    anonymizeIP: true
    disable: false
    respectDoNotTrack: true
    useSessionStorage: true
  instagram:
    disable: false
    simple: false
  x:
    disable: false
    enableDNT: true
    simple: false
    disableInlineCSS: true
  vimeo:
    disable: false
    simple: false
  youtube:
    disable: false
    privacyEnhanced: true

ignoreErrors: error-remote-getjson
